<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Box Firebase</title>
    <style>
        /* Reset base e layout */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #e5ddd5; /* Colore tipico chat */
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        .chat-container { 
            width: 100%; 
            max-width: 500px; 
            height: 100vh; /* Occupa tutto lo schermo su mobile */
            background: #ffffff; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        
        #chat { 
            flex: 1; /* Occupa tutto lo spazio disponibile tra header e footer */
            padding: 20px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }
        
        .msg-bubble { 
            padding: 10px 15px; 
            border-radius: 12px; 
            background: #f1f0f0; 
            max-width: 85%; 
            align-self: flex-start;
            word-wrap: break-word;
        }
        
        .msg-bubble b { display: block; font-size: 0.75em; color: #007bff; margin-bottom: 4px; }
        
        .input-area { 
            padding: 15px; 
            background: #f0f0f0; 
            border-top: 1px solid #ddd; 
            display: flex; 
            gap: 8px; 
        }
        
        input { padding: 12px; border: 1px solid #ccc; border-radius: 20px; outline: none; }
        #user { width: 80px; }
        #msg { flex: 1; }
        
        button { 
            padding: 10px 20px; 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 20px; 
            cursor: pointer; 
            font-weight: bold;
        }
        
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

    <div class="chat-container">
        <div id="chat"></div>
        <div class="input-area">
            <input type="text" id="user" placeholder="Nome">
            <input type="text" id="msg" placeholder="Scrivi un messaggio...">
            <button onclick="inviaMessaggio()">Invia</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6mN6izXzecZfiLhAPP72GLp9i9oLKDRE",
            authDomain: "chatbox01-c525b.firebaseapp.com",
            databaseURL: "https://chatbox01-c525b-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "chatbox01-c525b",
            storageBucket: "chatbox01-c525b.firebasestorage.app",
            messagingSenderId: "473333196171",
            appId: "1:473333196171:web:b6651ac1967ed77978bb8e",
            measurementId: "G-C3R5SH3LXJ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, 'messaggi');

        window.inviaMessaggio = () => {
            const user = document.getElementById('user').value || "Anonimo";
            const msg = document.getElementById('msg').value;
            if(msg.trim() === "") return;
            push(chatRef, { user: user, text: msg });
            document.getElementById('msg').value = '';
        };

        onChildAdded(chatRef, (data) => {
            const m = data.val();
            const div = document.getElementById('chat');
            div.innerHTML += `<div class="msg-bubble"><b>${m.user}</b> ${m.text}</div>`;
            div.scrollTop = div.scrollHeight;
        });
    </script>
</body>
</html>
