<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Box Firebase</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: sans-serif; 
            background-color: #e5ddd5; 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden;
        }

        .chat-container { 
            width: 100%; 
            height: 100%; 
            background: #ffffff; 
            display: flex; 
            flex-direction: column; 
        }
        
        #chat { 
            flex: 1; 
            padding: 20px; 
            /* Spazio extra per evitare che il contenuto finisca sotto l'input */
            padding-bottom: 90px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }
        
        .msg-bubble { 
            padding: 10px 15px; 
            border-radius: 12px; 
            background: #f1f0f0; 
            max-width: 85%; 
            align-self: flex-start;
            word-wrap: break-word;
        }
        
        .msg-bubble b { display: block; font-size: 0.75em; color: #007bff; margin-bottom: 4px; }
        
        .input-area { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            padding: 10px; 
            background: #f0f0f0; 
            border-top: 1px solid #ddd; 
            display: flex; 
            gap: 8px; 
            height: 70px;
        }
        
        input { padding: 10px; border: 1px solid #ccc; border-radius: 20px; outline: none; }
        #user { width: 75px; flex-shrink: 0; } 
        #msg { flex: 1; min-width: 0; } 
        
        button { 
            padding: 0 15px; 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 20px; 
            cursor: pointer; 
            font-weight: bold;
        }
        
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

    <div class="chat-container">
        <div id="chat"></div>
        <div class="input-area">
            <input type="text" id="user" placeholder="Nome">
            <input type="text" id="msg" placeholder="Scrivi un messaggio...">
            <button onclick="inviaMessaggio()">Invia</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6mN6izXzecZfiLhAPP72GLp9i9oLKDRE",
            authDomain: "chatbox01-c525b.firebaseapp.com",
            databaseURL: "https://chatbox01-c525b-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "chatbox01-c525b",
            storageBucket: "chatbox01-c525b.firebasestorage.app",
            messagingSenderId: "473333196171",
            appId: "1:473333196171:web:b6651ac1967ed77978bb8e",
            measurementId: "G-C3R5SH3LXJ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, 'messaggi');

        window.inviaMessaggio = () => {
            const user = document.getElementById('user').value || "Anonimo";
            const msg = document.getElementById('msg').value;
            if(msg.trim() === "") return;
            push(chatRef, { user: user, text: msg });
            document.getElementById('msg').value = '';
        };

        onChildAdded(chatRef, (data) => {
            const m = data.val();
            const div = document.getElementById('chat');
            
            const container = document.createElement('div');
            container.className = "msg-bubble";
            
            const userBold = document.createElement('b');
            userBold.textContent = m.user;
            
            const textSpan = document.createElement('span');
            textSpan.textContent = " " + m.text;
            
            container.appendChild(userBold);
            container.appendChild(textSpan);
            
            div.appendChild(container);
            div.scrollTop = div.scrollHeight;
        });
    </script>
</body>
</html>
